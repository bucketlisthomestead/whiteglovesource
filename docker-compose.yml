services:
  mysql:
    image: mysql:8.0
    container_name: wgds-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: white_glove_delivery
      MYSQL_USER: wgds
      MYSQL_PASSWORD: wgdspassword
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: wgds-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  postgres:
    image: postgres:16-alpine
    container_name: wgds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wgds
      POSTGRES_PASSWORD: wgdspassword
      POSTGRES_DB: white_glove_delivery
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wgds -d white_glove_delivery']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  postgres_data:
