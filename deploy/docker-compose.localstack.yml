# LocalStack local app stack — nginx :80 is the only public entry point.
# Internal: frontend (Vite :5173), api (:3000), LocalStack via host.docker.internal:4566.
#
# Usage:
#   docker compose -f deploy/docker-compose.localstack.yml --env-file .env.localstack up -d --build
services:
  api:
    container_name: wgs-api
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.localstack
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      SMTP_HOST: host.docker.internal
      AWS_ENDPOINT_URL: http://host.docker.internal:4566
      S3_PUBLIC_BASE_URL: http://host.docker.internal:4566/wgs-local-app
      CORS_ORIGIN: http://local.whiteglovesource.com
    volumes:
      - api_uploads:/app/uploads
    networks:
      - wgs

  frontend:
    container_name: wgs-frontend
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: /api
      VITE_HMR_HOST: local.whiteglovesource.com
      VITE_HMR_CLIENT_PORT: '80'
    networks:
      - wgs

  nginx:
    container_name: wgs-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.localstack.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - wgs

volumes:
  api_uploads:
  frontend_node_modules:

networks:
  wgs:
    driver: bridge
