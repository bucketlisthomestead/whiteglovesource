# Ephemeral MySQL 8 for pgloader local migration tests (port 3307).
# Used when host MySQL is v9+ or occupies port 3306.
services:
  mysql-migrate:
    image: mysql:8.0
    container_name: wgds-mysql-migrate
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: white_glove_delivery
      MYSQL_USER: wgds
      MYSQL_PASSWORD: wgdspassword
    ports:
      - '3307:3306'
    volumes:
      - mysql_migrate_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-prootpassword']
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  mysql_migrate_data:
