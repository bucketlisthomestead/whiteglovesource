# Ephemeral MySQL 8 for pgloader local migration tests (port 3307).
# Used when host MySQL is v9+ or occupies port 3306.
services:
  mysql-migrate:
    image: mysql:8.0
    container_name: wgds-mysql-migrate
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: white_glove_delivery
      MYSQL_USER: wgds
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - '3307:3306'
    volumes:
      - mysql_migrate_data:/var/lib/mysql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -uroot -p"$$MYSQL_ROOT_PASSWORD"',
        ]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  mysql_migrate_data:
